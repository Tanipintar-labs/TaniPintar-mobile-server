root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/server"
  cmd = "go build -buildvcs=false -o ./tmp/server ./cmd/api/"
  delay = 1000
  exclude_dir = ["tmp", "certs", ".git", ".gemini"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml", "yaml", "yml"]
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
