services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - ./certs:/app/certs:ro
    restart: unless-stopped

volumes:
  go-modules:
  go-build-cache:
